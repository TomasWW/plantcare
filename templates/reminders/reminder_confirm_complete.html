{% extends "base.html" %}
{% block content %}
<h2>Confirm Complete Reminder</h2>
<p>Are you sure you want to mark the reminder for {{ reminder.plant.common_name }} as complete?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Complete</button>
    <a href="{% url 'list_reminders' %}">Cancel</a>
</form>
{% endblock %}
