{% extends "base.html" %}
{% block content %}
<h2>Confirm Delete Reminder</h2>
<p>Are you sure you want to delete the reminder for {{ reminder.plant.common_name }}?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'list_reminders' %}">Cancel</a>
</form>
{% endblock %}
